services:
  plotmapai:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////app/data/plotmap.db
      - UPLOAD_DIR=/app/uploads
      - MAX_CONTENT_LENGTH=104857600
    restart: unless-stopped
